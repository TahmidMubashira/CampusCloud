name: CampusCloud CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:

  # ── Backend Job ───────────────────────────────────────────────────────────────
  backend:
    name: Laravel Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, zip, pdo
          coverage: none

      - name: Copy environment file
        run: cp .env.example .env

      - name: Override DB settings for CI
        # We skip MSSQL in CI since SQL Server cannot run as a free
        # GitHub Actions service container. DB connectivity is verified
        # manually on developer machines against the shared server.
        run: |
          {
            echo ""
            echo "APP_ENV=testing"
            echo "APP_DEBUG=true"
            echo "APP_URL=http://127.0.0.1:8000"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=:memory:"
            echo "CACHE_DRIVER=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
            echo "LOG_CHANNEL=stack"
          } >> .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Clear config cache
        run: php artisan config:clear

      - name: Verify all routes load correctly
        run: php artisan route:list

  # ── Frontend Job ──────────────────────────────────────────────────────────────
  frontend:
    name: React Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Create frontend environment
        run: |
          printf "VITE_API_URL=http://127.0.0.1:8000/api\n" > .env

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build